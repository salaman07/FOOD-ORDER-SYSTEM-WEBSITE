<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Order Software</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Food Order System</h1>
        <nav>
            <a href="#" onclick="showSection('home')">Home</a>
            <a href="#" onclick="showSection('menu')">Menu</a>
            <a href="#" onclick="showSection('cart')">Cart (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <!-- Home Section -->
    <section id="home" class="active">
        <h2>Welcome to Our Resturent </h2>
        <p>Order fresh & delicious food delivered to your doorstep.</p>
        <button onclick="showSection('menu')">Order Now</button>
       
    </section>

    <!-- Menu Section -->
    <section id="menu">
        <h2>Our Menu</h2>
        <div class="menu-container" id="menuList"></div>
    </section>

    <!-- Cart Section -->
    <section id="cart">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>
        <h3 id="totalAmount"></h3>
        <button onclick="placeOrder()">Place Order</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
